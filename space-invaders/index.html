<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOGARTY SPACE INVADERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            height: 100vh;
            width: auto;
        }
        #mobile-controls {
            position: fixed;
            bottom: 16px;
            left: 0; right: 0;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 16px;
            pointer-events: none;
            z-index: 20;
        }
        .mobile-btn {
            width: 64px; height: 64px;
            border: 2px solid rgba(0,255,0,0.4);
            border-radius: 50%;
            background: rgba(0,255,0,0.08);
            color: #0f0;
            font-size: 22px;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            pointer-events: auto;
        }
        .mobile-btn:active {
            background: rgba(0,255,0,0.3);
        }
        .mobile-group { display: flex; gap: 10px; align-items: center; }
        .mobile-btn.small {
            width: 44px; height: 44px;
            font-size: 10px;
            border-color: rgba(0,255,0,0.25);
        }
        @media (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
        @media (max-width: 600px) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <canvas id="game-canvas" width="672" height="768"></canvas>
    <div id="mobile-controls">
        <div class="mobile-group">
            <div class="mobile-btn" id="mb-left">&#9664;</div>
            <div class="mobile-btn" id="mb-right">&#9654;</div>
        </div>
        <div class="mobile-group">
            <div class="mobile-btn small" id="mb-pause">&#9208;</div>
            <div class="mobile-btn small" id="mb-enter">GO</div>
            <div class="mobile-btn" id="mb-fire">&#9679;</div>
        </div>
    </div>
    <script src="part1_sprites_audio.js"></script>
    <script src="part2_constants_background.js"></script>
    <script src="part3_state_entities.js"></script>
    <script src="part4_ui_loop.js"></script>
</body>
</html>
