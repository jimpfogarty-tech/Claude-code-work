<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogarty Arcade</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .games {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        a.game-card {
            display: block;
            background: #222;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 2rem 3rem;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
            min-width: 200px;
        }
        a.game-card:hover {
            border-color: #0f0;
            transform: scale(1.05);
        }
        .game-card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
        }
        .game-card p {
            margin: 0;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Fogarty Arcade</h1>
    <div class="games">
        <a class="game-card" href="asteroids/">
            <h2>Asteroids</h2>
            <p>Classic asteroid-blasting action</p>
        </a>
        <a class="game-card" href="space-invaders/">
            <h2>Space Invaders</h2>
            <p>Retro alien invasion defense</p>
        </a>
    </div>
</body>
</html>
