<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Movement Controls</title>
</head>
<body>
    <h1>Player Movement Controls</h1>
    <p>Use the Arrow keys to move the player!</p>
    <script>
        document.addEventListener('keydown', function(event) {
            switch (event.key) {
                case 'ArrowUp':
                    console.log('Move Up');
                    break;
                case 'ArrowDown':
                    console.log('Move Down');
                    break;
                case 'ArrowLeft':
                    console.log('Move Left');
                    break;
                case 'ArrowRight':
                    console.log('Move Right');
                    break;
                default:
                    break;
            }
        });
    </script>
</body>
</html>
