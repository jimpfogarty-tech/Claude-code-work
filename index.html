<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: black; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="asteroidsCanvas"></canvas>
    <script>
        const canvas = document.getElementById('asteroidsCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let spaceship; 
        const asteroids = [];

        class Spaceship {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.angle = 0;
                this.velocity = { x: 0, y: 0 };
                this.size = 20;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.moveTo(-this.size, -this.size);
                ctx.lineTo(this.size, 0);
                ctx.lineTo(-this.size, this.size);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.angle += (Math.random() - 0.5) * 0.1;

                // Wrap around the edges
                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }

            thrust() {
                this.velocity.x += Math.cos(this.angle) * 0.1;
                this.velocity.y += Math.sin(this.angle) * 0.1;
            }
        }

        class Asteroid {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = { x: Math.cos(this.angle), y: Math.sin(this.angle) };
            }

            draw() {
                ctx.fillStyle = 'gray';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                // Wrap around the edges
                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }
        }

        function spawnAsteroids() {
            for (let i = 0; i < 10; i++) {
                const radius = Math.random() * 20 + 10;
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                asteroids.push(new Asteroid(x, y, radius));
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            spaceship.draw();
            spaceship.update();

            asteroids.forEach(asteroid => {
                asteroid.draw();
                asteroid.update();
            });

            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (event) => {
            if (event.code === 'ArrowUp') spaceship.thrust();
        });

        function init() {
            spaceship = new Spaceship();
            spawnAsteroids();
            update();
        }

        window.onload = init;
    </script>
</body>
</html>
